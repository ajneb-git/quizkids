<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Shield background -->
  <path d="M 100 8 L 192 8 L 192 148 Q 192 195 100 215 Q 8 195 8 148 L 8 8 Z" fill="#004080" stroke="#c8a830" stroke-width="4"/>
  <!-- Top-left quarter : celeste blue -->
  <path d="M 8 8 L 100 8 L 100 108 L 8 108 Z" fill="#75C8DB"/>
  <!-- Top-right quarter : white -->
  <path d="M 100 8 L 192 8 L 192 108 L 100 108 Z" fill="#ffffff"/>
  <!-- Bottom-left quarter : white -->
  <clipPath id="shield-clip">
    <path d="M 100 8 L 192 8 L 192 148 Q 192 195 100 215 Q 8 195 8 148 L 8 8 Z"/>
  </clipPath>
  <rect x="8" y="108" width="92" height="115" fill="#ffffff" clip-path="url(#shield-clip)"/>
  <!-- Bottom-right quarter : celeste blue -->
  <rect x="100" y="108" width="92" height="115" fill="#75C8DB" clip-path="url(#shield-clip)"/>
  <!-- Gold cross dividers -->
  <rect x="94" y="8" width="12" height="207" fill="#c8a830" clip-path="url(#shield-clip)"/>
  <rect x="8" y="102" width="184" height="12" fill="#c8a830"/>
  <!-- Celtic cross top-left (white on celeste) -->
  <rect x="34" y="24" width="8" height="36" fill="#ffffff"/>
  <rect x="22" y="36" width="32" height="8" fill="#ffffff"/>
  <!-- Star top-right (celeste on white) -->
  <polygon points="146,20 150,34 164,34 153,43 157,57 146,48 135,57 139,43 128,34 142,34" fill="#75C8DB"/>
  <!-- RC text bottom-left -->
  <text x="54" y="168" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#004080">RC</text>
  <!-- CELTA bottom-right -->
  <text x="146" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#ffffff">CELTA</text>
  <text x="146" y="178" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#ffffff">VIGO</text>
  <!-- Outer border -->
  <path d="M 100 8 L 192 8 L 192 148 Q 192 195 100 215 Q 8 195 8 148 L 8 8 Z" fill="none" stroke="#c8a830" stroke-width="5"/>
</svg>
